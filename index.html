<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scaner Monede - Detecție & Aliniere Automată</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #11141a; 
            color: #e2e8f0; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            width: 100vw; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }

        .btn-start { 
            background: #28a745; 
            color: white; 
            padding: 16px 40px; 
            border-radius: 30px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 18px; 
            border: none; 
            transition: 0.2s; 
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.4);
            z-index: 10;
        }
        .btn-start:hover { 
            background: #218838; 
            transform: scale(1.05);
        }

        .camera-container {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
        }

        #videoElement {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Viewfinder HUD SF */
        .hud-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            border: 40px solid rgba(0,0,0,0.5);
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .viewfinder-circle {
            width: 260px;
            height: 260px;
            border: 3px dashed rgba(255, 7, 58, 0.6);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.2);
            transition: border-color 0.3s;
        }

        .viewfinder-circle.calibrating {
            border-color: #ffc107;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.03); }
        }

        .status-box {
            position: absolute;
            bottom: 30px;
            background: rgba(0,0,0,0.85);
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            border: 1px solid #2d3748;
            pointer-events: none;
            color: #00bfff;
            text-align: center;
            max-width: 80%;
        }

        /* Overlay rezultat final pe tot ecranul */
        .fullscreen-overlay { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-color: rgba(10, 12, 16, 0.98); 
            z-index: 999; 
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .fullscreen-overlay img { 
            max-width: 90vw;
            max-height: 80vh;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 2px solid #2d3748; 
            border-radius: 12px;
            object-fit: contain;
        }

        .close-btn { 
            position: absolute; 
            top: 25px; 
            right: 35px; 
            color: #cbd5e0; 
            font-size: 44px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.2s;
            user-select: none;
        }
        .close-btn:hover {
            color: white;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

<div class="container">
    <button id="btnPorneste" class="btn-start">🔌 Porneste camera</button>
    
    <div id="cameraContainer" class="camera-container">
        <video id="videoElement" autoplay playsinline></video>
        <div class="hud-overlay">
            <div id="viewfinder" class="viewfinder-circle"></div>
        </div>
        <div id="statusText" class="status-box">Apropiați moneda și aliniați desenul roșu în cerc...</div>
    </div>
</div>

<div id="resultOverlay" class="fullscreen-overlay">
    <span id="btnInchideRezultat" class="close-btn">&times;</span>
    <img id="imgRezultatFinal" src="" alt="Rezultat Aliniere">
    <div style="margin-top: 15px; font-size: 15px; color: #a0aec0; font-weight: 500;">Desen extras prin filtrare cromatică</div>
</div>

<script>
    const btnPorneste = document.getElementById('btnPorneste');
    const cameraContainer = document.getElementById('cameraContainer');
    const videoElement = document.getElementById('videoElement');
    const viewfinder = document.getElementById('viewfinder');
    const statusText = document.getElementById('statusText');
    const resultOverlay = document.getElementById('resultOverlay');
    const btnInchideRezultat = document.getElementById('btnInchideRezultat');
    const imgRezultatFinal = document.getElementById('imgRezultatFinal');

    let stream = null;
    let videoTrack = null;
    let isScanning = false;

    // Parametrii Monedei 2 de referință (moneda-front.jpg)
    const imgCoalaGoala = new Image();
    let puncteCoala = [];
    let mascaDest = null;
    let mascaDestW = 0;
    let mascaDestH = 0;

    // Cache-uri pentru cadre
    let analysisCanvas = document.createElement('canvas');
    let analysisCtx = analysisCanvas.getContext('2d');

    // Stările sistemului de scanare
    const STATE_SCANNING = 1;
    const STATE_CALIBRATING = 2;
    const STATE_CAPTURING = 3;
    let currentState = STATE_SCANNING;

    let sharpnessHistory = [];
    let bestFocusDistance = 0;
    let bestSharpness = 0;
    let calibrationSteps = [];
    let currentStepIndex = 0;

    // Saturație implicită pentru desenul roșu
    const pragRosuStandard = 50; 

    // --- ÎNCĂRCARE REZISTENTĂ MONEDA-FRONT.JPG ---
    imgCoalaGoala.crossOrigin = "anonymous";
    imgCoalaGoala.onload = () => {
        // Rulăm Magic Wand pe moneda-front pentru a determina masca de referință
        const rezultat = detecteazaMonedaMagicWand(imgCoalaGoala, false);
        puncteCoala = rezultat.puncte;
        mascaDest = rezultat.mask;
        mascaDestW = rezultat.maskW;
        mascaDestH = rezultat.maskH;
    };
    imgCoalaGoala.onerror = () => {
        // Siguranță defensivă: dacă fișierul moneda-front.jpg lipsește pe server, generăm o formă gri
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = 600;
        tempCanvas.height = 600;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.fillStyle = '#11141a';
        tempCtx.fillRect(0, 0, 600, 600);
        tempCtx.fillStyle = '#718096';
        tempCtx.beginPath();
        tempCtx.arc(300, 300, 180, 0, 2 * Math.PI);
        tempCtx.fill();
        imgCoalaGoala.src = tempCanvas.toDataURL();
    };
    imgCoalaGoala.src = "moneda-front.jpg";

    // --- PORNIRE CAMERĂ SPATE ---
    btnPorneste.addEventListener('click', async () => {
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: 'environment', // Obligă utilizarea camerei spate
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            });
            videoElement.srcObject = stream;
            videoTrack = stream.getVideoTracks()[0];
            
            btnPorneste.style.display = 'none';
            cameraContainer.style.display = 'block';
            isScanning = true;
            currentState = STATE_SCANNING;
            
            requestAnimationFrame(analizaFrame);
        } catch (e) {
            alert("Eroare la accesarea camerei din spate. Verificați permisiunile!");
        }
    });

    // --- INCHIDERE REZULTAT & RESTART ---
    btnInchideRezultat.addEventListener('click', () => {
        resultOverlay.style.display = 'none';
        imgRezultatFinal.src = '';
        currentState = STATE_SCANNING;
        viewfinder.className = 'viewfinder-circle';
        statusText.textContent = "Apropiați moneda și aliniați desenul roșu în cerc...";
        statusText.style.color = "#00bfff";
    });

    // --- ALGORITM REAL-TIME DE ANALIZĂ A ROȘULUI ȘI CLARITĂȚII ---
    function calculeazaClaritateRosie(ctx, w, h) {
        const imgData = ctx.getImageData(0, 0, w, h);
        const pixels = imgData.data;
        
        let sumGrad = 0;
        let countRed = 0;
        
        // Scanăm redus pentru performanță sporită de procesare
        for (let y = 2; y < h - 2; y += 2) {
            for (let x = 2; x < w - 2; x += 2) {
                const idx = (y * w + x) * 4;
                const r = pixels[idx];
                const g = pixels[idx+1];
                const b = pixels[idx+2];
                
                // Izolare cromatică a roșului saturat [2]
                if (r > 130 && r - g > 65 && r - b > 65) {
                    countRed++;
                    
                    // Calculăm variația locală a pixelilor roșii învecinați (măsură de focus/claritate)
                    const idxRight = idx + 4;
                    const idxDown = idx + w * 4;
                    
                    const rRight = pixels[idxRight];
                    const rDown = pixels[idxDown];
                    
                    const gradX = Math.abs(r - rRight);
                    const gradY = Math.abs(r - rDown);
                    
                    sumGrad += (gradX + gradY);
                }
            }
        }
        
        const totalPixelsAnalyzed = (w * h) / 4;
        return {
            ratio: countRed / totalPixelsAnalyzed,
            sharpness: countRed > 0 ? (sumGrad / countRed) : 0
        };
    }

    // --- LOOP SCANARE ȘI DECIZIE FOCALIZARE ---
    async function analizaFrame() {
        if (!isScanning || currentState === STATE_CAPTURING) return;

        if (videoElement.readyState === videoElement.HAVE_ENOUGH_DATA) {
            const size = 150;
            analysisCanvas.width = size;
            analysisCanvas.height = size;
            
            // Desenăm doar regiunea centrală a vederii (viewfinder-ul) pentru analiză cromatică
            const sx = (videoElement.videoWidth - size) / 2;
            const sy = (videoElement.videoHeight - size) / 2;
            analysisCtx.drawImage(videoElement, sx, sy, size, size, 0, 0, size, size);
            
            const metrice = calculeazaClaritateRosie(analysisCtx, size, size);
            
            // 1. Starea SCANNING: Căutăm prezența desenului roșu în cercul viewfinder-ului
            if (currentState === STATE_SCANNING) {
                if (metrice.ratio > 0.015) { // Cel puțin 1.5% din cadru este roșu saturat
                    currentState = STATE_CALIBRATING;
                    viewfinder.className = 'viewfinder-circle calibrating';
                    statusText.textContent = "Marcaj detectat! Se reglează focalizarea...";
                    statusText.style.color = "#ffc107";
                    
                    sharpnessHistory = [];
                    bestFocusDistance = 0;
                    bestSharpness = 0;
                    
                    // Inițiem calibrarea de focalizare hardware dacă dispozitivul suportă focusMode manual
                    const capabilities = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
                    if (capabilities.focusMode && capabilities.focusMode.includes('manual') && capabilities.focusDistance) {
                        const minF = capabilities.focusDistance.min || 0.1;
                        const maxF = capabilities.focusDistance.max || 1.0;
                        const step = (maxF - minF) / 4;
                        
                        calibrationSteps = [minF, minF + step, minF + 2*step, minF + 3*step, maxF];
                        currentStepIndex = 0;
                        
                        setTimeout(executaPasCalibrareFocus, 50);
                    } else {
                        // iOS/Safari fallback: Așteptăm 1.5 secunde ca autofocusul hardware continuu să blocheze claritatea optima
                        setTimeout(executaCapturaAutomataFallback, 1500);
                    }
                }
            } 
            // 2. Starea CALIBRATING (pentru sisteme non-manuale, analizăm în timp real când crește claritatea)
            else if (currentState === STATE_CALIBRATING && !calibrationSteps.length) {
                sharpnessHistory.push(metrice.sharpness);
                if (sharpnessHistory.length > 20) {
                    sharpnessHistory.shift();
                }
            }
        }
        
        requestAnimationFrame(analizaFrame);
    }

    // --- CALIBRARE FOCUS HARDWARE (MĂTURARE PAS CU PAS) ---
    async function executaPasCalibrareFocus() {
        if (currentState !== STATE_CALIBRATING) return;
        
        if (currentStepIndex < calibrationSteps.length) {
            const distantaCurenta = calibrationSteps[currentStepIndex];
            
            try {
                await videoTrack.applyConstraints({
                    advanced: [{
                        focusMode: 'manual',
                        focusDistance: distantaCurenta
                    }]
                });
            } catch (e) {
                console.warn("Eroare focus:", e);
            }
            
            // Așteptăm ca lentila fizică să se deplaseze, apoi măsurăm claritatea imaginii obținute
            setTimeout(() => {
                const size = 150;
                const sx = (videoElement.videoWidth - size) / 2;
                const sy = (videoElement.videoHeight - size) / 2;
                analysisCtx.drawImage(videoElement, sx, sy, size, size, 0, 0, size, size);
                
                const metrice = calculeazaClaritateRosie(analysisCtx, size, size);
                
                if (metrice.sharpness > bestSharpness) {
                    bestSharpness = metrice.sharpness;
                    bestFocusDistance = distantaCurenta;
                }
                
                currentStepIndex++;
                executaPasCalibrareFocus();
            }, 180);
        } else {
            // Aplicăm distanța de focalizare optimă determinată din pași
            try {
                await videoTrack.applyConstraints({
                    advanced: [{
                        focusMode: 'manual',
                        focusDistance: bestFocusDistance
                    }]
                });
            } catch (e) {}
            
            setTimeout(declanseazaCapturaFoto, 100);
        }
    }

    // --- FALLBACK CAPTURĂ SAFARI/IOS (AUTOFOCUS CONTINUU) ---
    function executaCapturaAutomataFallback() {
        if (currentState !== STATE_CALIBRATING) return;
        declanseazaCapturaFoto();
    }

    // --- CAPTURĂ ȘI PROCESARE IMAGINE (HOMOGRAFIE ȘI BLENDING MULTIPLY) ---
    function declanseazaCapturaFoto() {
        currentState = STATE_CAPTURING;
        statusText.textContent = "Focalizat! Se procesează desenul...";
        statusText.style.color = "#28a745";
        
        const capturedCanvas = document.createElement('canvas');
        capturedCanvas.width = videoElement.videoWidth;
        capturedCanvas.height = videoElement.videoHeight;
        const capCtx = capturedCanvas.getContext('2d');
        capCtx.drawImage(videoElement, 0, 0);
        
        // Stocăm pixelii cadrului capturat
        const srcW = capturedCanvas.width;
        const srcH = capturedCanvas.height;
        const srcPixels = capCtx.getImageData(0, 0, srcW, srcH).data;
        
        // Rulăm Magic Wand pentru a detecta moneda în perspectivă din poză
        const rezultat = detecteazaMonedaMagicWand(capturedCanvas, true);
        const puncteSelectate = rezultat.puncte;
        const mascaSursa = rezultat.mask;
        const mascaSursaW = rezultat.maskW;
        const mascaSursaH = rezultat.maskH;
        
        const latimeDest = imgCoalaGoala.naturalWidth;
        const inaltimeDest = imgCoalaGoala.naturalHeight;
        
        // Canvas de procesare finală
        const outputCanvas = document.createElement('canvas');
        outputCanvas.width = latimeDest;
        outputCanvas.height = inaltimeDest;
        const outCtx = outputCanvas.getContext('2d');
        
        // Desenăm moneda-front ca fundal [2]
        outCtx.drawImage(imgCoalaGoala, 0, 0);
        
        // Canvas temporar pentru desenul roșu extras
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = latimeDest;
        tempCanvas.height = inaltimeDest;
        const tempCtx = tempCanvas.getContext('2d');
        const imgDataDesen = tempCtx.createImageData(latimeDest, inaltimeDest);
        const outPixels = imgDataDesen.data;
        
        const srcPoints = puncteSelectate.map(p => [p.x, p.y]);
        const dstPoints = puncteCoala.map(p => [p.x, p.y]);
        
        // Homografia directă: de la Moneda de referință 2 (destinație) -> Moneda perspectivă 1 (sursă)
        const H = getHomographyMatrix(dstPoints, srcPoints);
        const h00 = H[0], h01 = H[1], h02 = H[2];
        const h10 = H[3], h11 = H[4], h12 = H[5];
        const h20 = H[6], h21 = H[7], h22 = H[8];
        
        // Praguri cromatici pentru detectarea și decuparea exclusivă a roșului saturat [2]
        const pragRosu = pragRosuStandard;
        const zonaTranzitie = 15;
        const pragMinim = Math.max(0, pragRosu - zonaTranzitie);
        
        for (let v = 0; v < inaltimeDest; v++) {
            for (let u = 0; u < latimeDest; u++) {
                const destIdx = (v * latimeDest + u) * 4;
                
                // Masca organică destinație (Moneda 2)
                const valMascaDest = getMaskValue(u, v, mascaDest, mascaDestW, mascaDestH, latimeDest, inaltimeDest);
                
                if (valMascaDest > 0.0) {
                    // Mapare directă prin homografie (fără nicio rotație)
                    const denom = h20 * u + h21 * v + 1.0;
                    const sx = (h00 * u + h01 * v + h02) / denom;
                    const sy = (h10 * u + h11 * v + h12) / denom;
                    
                    const x0 = Math.floor(sx);
                    const y0 = Math.floor(sy);
                    
                    if (x0 >= 0 && x0 < srcW - 1 && y0 >= 0 && y0 < srcH - 1) {
                        // Masca organică sursă (Moneda 1)
                        const valMascaSursa = getMaskValue(sx, sy, mascaSursa, mascaSursaW, mascaSursaH, srcW, srcH);
                        
                        if (valMascaSursa > 0.0) {
                            const dx_s = sx - x0;
                            const dy_s = sy - y0;
                            
                            const idx00 = (y0 * srcW + x0) * 4;
                            const idx10 = idx00 + 4;
                            const idx01 = idx00 + srcW * 4;
                            const idx11 = idx01 + 4;
                            
                            // Eșantionare biliniară pe imaginea sursă capturată
                            let r = (1 - dx_s) * (1 - dy_s) * srcPixels[idx00]     + dx_s * (1 - dy_s) * srcPixels[idx10]     + (1 - dx_s) * dy_s * srcPixels[idx01]     + dx_s * dy_s * srcPixels[idx11];
                            let g = (1 - dx_s) * (1 - dy_s) * srcPixels[idx00 + 1] + dx_s * (1 - dy_s) * srcPixels[idx10 + 1] + (1 - dx_s) * dy_s * srcPixels[idx01 + 1] + dx_s * dy_s * srcPixels[idx11 + 1];
                            let b = (1 - dx_s) * (1 - dy_s) * srcPixels[idx00 + 2] + dx_s * (1 - dy_s) * srcPixels[idx10 + 2] + (1 - dx_s) * dy_s * srcPixels[idx01 + 2] + dx_s * dy_s * srcPixels[idx11 + 2];
                            
                            // Analiză cromatică fină (izolăm doar roșul intens, eliminând umbrele, reflexiile metalice sau padul) [2]
                            let redness = r - Math.max(g, b);
                            
                            let alpha;
                            if (redness <= pragMinim) {
                                alpha = 0; 
                            } else if (redness >= pragRosu) {
                                alpha = 255; 
                            } else {
                                let ratio = (redness - pragMinim) / zonaTranzitie;
                                alpha = 255 * ratio;
                            }
                            
                            const alphaFinal = alpha * valMascaSursa * valMascaDest;
                            
                            outPixels[destIdx]     = r;
                            outPixels[destIdx + 1] = g;
                            outPixels[destIdx + 2] = b;
                            outPixels[destIdx + 3] = alphaFinal;
                        } else {
                            outPixels[destIdx + 3] = 0;
                        }
                    } else {
                        outPixels[destIdx + 3] = 0;
                    }
                } else {
                    outPixels[destIdx + 3] = 0;
                }
            }
        }
        
        tempCtx.putImageData(imgDataDesen, 0, 0);
        
        // Blending Multiply pe imaginea de fundal (moneda-front)
        outCtx.globalCompositeOperation = 'multiply';
        outCtx.drawImage(tempCanvas, 0, 0);
        
        // Afișarea rezultatului pe tot ecranul
        imgRezultatFinal.src = outputCanvas.toDataURL('image/png');
        resultOverlay.style.display = 'flex';
    }

    // --- Matematică Homografie ---
    function solve8x8(A, B) {
        const n = 8;
        for (let i = 0; i < n; i++) {
            let maxEl = Math.abs(A[i][i]);
            let maxRow = i;
            for (let k = i + 1; k < n; k++) {
                if (Math.abs(A[k][i]) > maxEl) {
                    maxEl = Math.abs(A[k][i]);
                    maxRow = k;
                }
            }
            const tmpRow = A[maxRow];
            A[maxRow] = A[i];
            A[i] = tmpRow;
            const tmpB = B[maxRow];
            B[maxRow] = B[i];
            B[i] = tmpB;
            if (Math.abs(A[i][i]) < 1e-10) return [1, 0, 0, 0, 1, 0, 0, 0];
            for (let k = i + 1; k < n; k++) {
                const c = -A[k][i] / A[i][i];
                A[k][i] = 0;
                for (let j = i + 1; j < n; j++) {
                    A[k][j] += c * A[i][j];
                }
                B[k] += c * B[i];
            }
        }
        const x = new Array(n).fill(0);
        for (let i = n - 1; i >= 0; i--) {
            let sum = B[i];
            for (let j = i + 1; j < n; j++) {
                sum -= A[i][j] * x[j];
            }
            x[i] = sum / A[i][i];
        }
        return x;
    }

    function getHomographyMatrix(src, dst) {
        const A = [];
        const B = [];
        for (let i = 0; i < 4; i++) {
            const x = src[i][0];
            const y = src[i][1];
            const u = dst[i][0];
            const v = dst[i][1];
            A.push([x, y, 1, 0, 0, 0, -u * x, -u * y]);
            B.push(u);
            A.push([0, 0, 0, x, y, 1, -v * x, -v * y]);
            B.push(v);
        }
        const h = solve8x8(A, B);
        return [h[0], h[1], h[2], h[3], h[4], h[5], h[6], h[7], 1.0];
    }

    function getMaskValue(x, y, mask, maskW, maskH, srcW, srcH) {
        if (!mask) return 1.0; 
        const mx = (x / srcW) * (maskW - 1);
        const my = (y / srcH) * (maskH - 1);
        const x0 = Math.floor(mx);
        const y0 = Math.floor(my);
        const x1 = Math.min(maskW - 1, x0 + 1);
        const y1 = Math.min(maskH - 1, y0 + 1);
        const dx = mx - x0;
        const dy = my - y0;
        if (x0 >= 0 && x0 < maskW && y0 >= 0 && y0 < maskH) {
            const val00 = mask[y0 * maskW + x0];
            const val10 = mask[y0 * maskW + x1];
            const val01 = mask[y1 * maskW + x0];
            const val11 = mask[y1 * maskW + x1];
            return (1 - dx) * (1 - dy) * val00 + dx * (1 - dy) * val10 + (1 - dx) * dy * val01 + dx * dy * val11;
        }
        return 0.0;
    }
</script>
</body>
